<header
  class="navbar"
  [class.navbar--menu-open]="isMenuOpen()"
  [class.navbar--transparent]="isTransparent()"
  [class.navbar--navy]="isNavyBg()"
>
  <div class="container container--wide navbar__inner">
    <!-- Logo mark -->
    <a routerLink="/" class="navbar__logo" (click)="closeMenu()">
      <img
        src="/logo-advance.png"
        alt="Advance Group"
        class="navbar__logo-img"
      />
    </a>

    <!-- Desktop nav / full-screen mobile overlay -->
    <nav class="navbar__nav" [class.navbar__nav--open]="isMenuOpen()">
      @for (link of links; track link.path; let i = $index) {
        <a
          [routerLink]="link.path"
          routerLinkActive="navbar__link--active"
          [routerLinkActiveOptions]="{ exact: link.path === '/' }"
          class="navbar__link"
          [class.navbar__link--has-logo]="!!link.logo"
          [attr.title]="link.logo ? link.label : null"
          (click)="closeMenu()"
        >
          @if (!link.logo) {
            <span class="navbar__link-index">0{{ i + 1 }}</span>
          }
          @if (link.logo) {
            <img
              [src]="link.logo"
              [alt]="link.label"
              class="navbar__link-logo"
            />
            <span class="navbar__link-label navbar__link-label--mobile">{{ link.label }}</span>
          } @else {
            <span class="navbar__link-label">{{ link.label }}</span>
          }
        </a>
      }
      <!-- Mobile-only CTA -->
      <a routerLink="/contacto" class="btn btn--primary navbar__cta-mobile" (click)="closeMenu()">
        Contáctanos
      </a>
    </nav>

    <!-- Desktop CTA — switches between outline (transparent) and primary (scrolled) -->
    <a
      routerLink="/contacto"
      class="btn navbar__cta"
      [class.btn--outline]="isTransparent() || isNavyBg()"
      [class.btn--primary]="!isTransparent() && !isNavyBg()"
      appMagnetic
      (click)="closeMenu()"
    >
      Contáctanos
    </a>

    <!-- Hamburger -->
    <button
      class="navbar__hamburger"
      [class.navbar__hamburger--open]="isMenuOpen()"
      [attr.aria-expanded]="isMenuOpen()"
      [attr.aria-label]="isMenuOpen() ? 'Cerrar menú' : 'Abrir menú'"
      (click)="toggleMenu()"
    >
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</header>
