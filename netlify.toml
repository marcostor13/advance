# ── Advance Group — Netlify Configuration ──────────────────────
# Monorepo: frontend/ is the Angular app, backend/ deploys to Coolify

[build]
  base    = "frontend"
  publish = "dist/advance-group-frontend/browser"
  command = "npm run build:prod"

[build.environment]
  NODE_VERSION = "22"

# SPA fallback — Angular Router needs this
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# Immutable cache for hashed assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"
